<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tracewright Narrative Uncertainty Map Demo</title>
  <style>
    :root {
      --paper: #f7f3eb;
      --panel: #fffdf8;
      --ink: #202124;
      --muted: #6b6258;
      --line: #d9d0c3;
      --accent: #315f72;
      --blue: #d7e3f5;
      --green: #dcebd9;
      --yellow: #f5e8bd;
      --orange: #f3cfaa;
      --gray: #e7e3dd;
      --red: #efd0c8;
      --shadow: 0 8px 18px rgba(35,31,26,.05);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Segoe UI", system-ui, sans-serif;
      line-height: 1.45;
    }
    .shell { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
    aside {
      padding: 28px 22px;
      background: #ece5d9;
      border-right: 1px solid var(--line);
    }
    main { padding: 32px; max-width: 1220px; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: 28px; line-height: 1.1; }
    h2 { margin-bottom: 4px; }
    h3 { margin-bottom: 10px; font-size: 17px; }
    .kicker {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .notice, .summary-overview {
      border-left: 4px solid var(--accent);
      background: #dcecf0;
      padding: 14px 16px;
      margin: 18px 0;
      line-height: 1.55;
    }
    .resource-links { display: grid; gap: 8px; margin: 12px 0 18px; }
    .resource-links a {
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,253,248,.78);
      padding: 10px 12px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }
    .case-list, .stack { display: grid; gap: 12px; }
    .case-button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,253,248,.75);
      padding: 14px;
      text-align: left;
      cursor: pointer;
    }
    .case-button.active { border-color: var(--accent); background: var(--panel); }
    .case-button span { display: block; margin-top: 4px; color: var(--muted); font-size: 13px; }
    .header { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
    .status { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; align-content: flex-start; }
    .tag, .flag {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      min-height: 28px;
      padding: 5px 10px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .green { background: var(--green); }
    .yellow { background: var(--yellow); }
    .orange { background: var(--orange); }
    .blue { background: var(--blue); }
    .gray { background: var(--gray); }
    .red { background: var(--red); }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--line); margin-bottom: 16px; }
    .tab {
      border: 1px solid transparent;
      border-bottom: 0;
      border-radius: 8px 8px 0 0;
      background: transparent;
      padding: 10px 14px;
      color: var(--muted);
      cursor: pointer;
    }
    .tab.active { border-color: var(--line); background: var(--panel); color: var(--ink); }
    .view { display: none; }
    .view.active { display: block; }
    .panel, .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .panel, .body { padding: 18px; }
    .panel-note { color: var(--muted); font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .tri { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .overview-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .overview-grid article { border-right: 1px solid rgba(49,95,114,.2); padding-right: 12px; }
    .overview-grid article:last-child { border-right: 0; }
    .overview-grid span { display: block; color: var(--accent); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .overview-note { margin-bottom: 0; font-weight: 700; }
    .review-guide { display: grid; gap: 16px; }
    .guide-layout { display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(260px, .55fr); gap: 14px; }
    .attention-panel, .legend-panel { border: 1px solid var(--line); border-radius: 8px; background: #fbf8f1; padding: 14px; }
    .attention-bars { display: grid; gap: 9px; margin: 10px 0 14px; }
    .bar { display: grid; grid-template-columns: 180px 1fr 52px; gap: 10px; align-items: center; }
    .track { height: 10px; border-radius: 999px; background: #ece5d9; overflow: hidden; }
    .fill { height: 100%; border-radius: 999px; }
    .fill.review { background: #af6e4d; }
    .fill.mediated { background: #567ca0; }
    .fill.anchor { background: #62835f; }
    .fill.claims { background: #b79b49; }
    .attention-definitions { display: grid; gap: 8px; margin: 10px 0 16px; color: var(--muted); font-size: 14px; }
    .attention-definitions p { margin-bottom: 0; }
    .texture-evidence-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin: 14px 0 16px; }
    .texture-evidence-list { border: 1px solid var(--line); border-radius: 8px; background: #fffaf0; padding: 12px; }
    .texture-evidence-list h4 { margin: 0 0 8px; color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .texture-evidence-item { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 6px 8px; width: 100%; border: 0; border-top: 1px solid var(--line); background: transparent; padding: 10px 0; text-align: left; cursor: pointer; }
    .texture-evidence-item:first-of-type { border-top: 0; }
    .texture-evidence-item strong { min-width: 0; overflow-wrap: anywhere; font-size: 13px; }
    .texture-evidence-item small { grid-column: 1 / -1; color: var(--muted); line-height: 1.45; }
    .texture-evidence-item .axis-source { grid-column: 1 / -1; color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .texture-badge { display: inline-flex; align-items: center; min-height: 28px; border: 1px solid var(--line); border-radius: 8px; padding: 5px 9px; margin-left: 4px; color: var(--ink); font-size: 12px; font-weight: 800; }
    .evidence-card-focus { outline: 3px solid rgba(36, 105, 121, 0.45); outline-offset: 4px; box-shadow: 0 0 0 7px rgba(36, 105, 121, 0.12); }
    .legend-list { display: grid; gap: 10px; }
    .legend-item p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .focus-list { display: grid; gap: 10px; }
    .focus-item { border: 1px solid var(--line); border-radius: 8px; background: #fbf8f1; padding: 12px; }
    .focus-item p { margin: 8px 0 0; }
    .guide-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .interpretation-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 14px; }
    .principle-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .principle-card { border: 1px solid var(--line); border-radius: 8px; background: #fbf8f1; padding: 14px; }
    .principle-card p { margin-bottom: 0; color: var(--muted); font-size: 14px; }
    .handling-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .handling-card { border: 1px solid var(--line); border-radius: 8px; background: #fffaf0; padding: 14px; }
    .handling-card p { margin-bottom: 0; color: var(--muted); font-size: 14px; }
    .text-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 8px 12px;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }
    .screening-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .screening-card p { margin-bottom: 0; }
    .guide-list { margin: 8px 0 0; padding-left: 20px; line-height: 1.6; }
    .message { display: grid; grid-template-columns: 190px 1fr; }
    .message.context { background: #f2f0ec; border-style: dashed; opacity: .82; }
    .meta { padding: 18px; border-right: 1px solid var(--line); background: rgba(236,229,217,.5); }
    .flag-row { display: flex; gap: 8px; flex-wrap: wrap; }
    blockquote { margin: 0 0 14px; border-left: 4px solid var(--accent); background: #f4efe5; padding: 14px 16px; line-height: 1.6; }
    .marked { margin: 14px 0; border: 1px solid var(--line); border-radius: 8px; background: #fffaf0; padding: 14px; }
    .mark { display: grid; grid-template-columns: 180px 170px 1fr; gap: 10px; margin-top: 10px; }
    code { background: var(--orange); border-radius: 6px; padding: 4px 7px; white-space: normal; }
    .box { border: 1px solid var(--line); border-radius: 8px; background: #fbf8f1; padding: 14px; }
    .source-table { width: 100%; border-collapse: collapse; }
    .source-table th, .source-table td { border-bottom: 1px solid var(--line); padding: 12px; text-align: left; vertical-align: top; }
    .source-table th { color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .claim-status { min-width: 130px; }
    @media (max-width: 980px) {
      .shell, .message, .grid, .tri, .mark, .overview-grid, .guide-layout, .screening-grid, .interpretation-grid, .principle-grid, .handling-grid { grid-template-columns: 1fr; }
      .texture-evidence-grid { grid-template-columns: 1fr; }
      main { padding: 22px; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      .bar { grid-template-columns: 1fr; }
      .header { display: block; }
      .status { justify-content: flex-start; }
    }
  </style>
</head>

      <h1>Narrative Uncertainty Map</h1>
      <div class="notice">

let selected = cases[0].id;
let view = "summary";
const $ = (selector) => document.querySelector(selector);
const esc = (value) => String(value)
  .replaceAll("&", "&amp;")
  .replaceAll("<", "&lt;")
  .replaceAll(">", "&gt;")
  .replaceAll('"', "&quot;")
  .replaceAll("'", "&#039;");

function item() { return cases.find((demoCase) => demoCase.id === selected); }

function render() {
  renderList();
  renderHead();
  renderView();
}

function renderList() {
  $("#caseList").innerHTML = cases.map((demoCase) => `
    <button class="case-button ${demoCase.id === selected ? "active" : ""}" data-case="${esc(demoCase.id)}">
      <strong>${esc(demoCase.name)}</strong>
      <span>${esc(demoCase.level)}</span>
    </button>
  `).join("");
}

function renderHead() {
  const current = item();
  $("#stage").textContent = current.stage;
  $("#name").textContent = current.name;
  $("#count").textContent = `${current.messages.length} review materials`;
  $("#level").textContent = current.level;
}

function renderView() {
  document.querySelectorAll(".view").forEach((element) => element.classList.remove("active"));
  document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.view === view));
  $(`#${view}`).classList.add("active");
  ({ summary, interpretation, timeline, claims, evidence, sources }[view])();
}

  $("#summary").innerHTML = `
    <div class="stack">

          ${overviewCell("Analysis overview", current.overview)}
          ${overviewCell("Uncertainty posture", current.posture)}

        <p class="overview-note">Tracewright is not designed to expose people. It is designed to slow down premature judgment.</p>

function principleCard(title, text) {
  return `<article class="principle-card"><h3>${esc(title)}</h3><p>${esc(text)}</p></article>`;
}

function handlingCard(title, text) {
  return `<article class="handling-card"><h3>${esc(title)}</h3><p>${esc(text)}</p></article>`;
}

function overviewCell(label, value) {
  return `<article><span>${esc(label)}</span><p>${esc(value)}</p></article>`;
}

function screeningCard(label, value) {
  return `<section class="panel screening-card"><p class="kicker">${esc(label)}</p><p>${esc(value)}</p></section>`;
}

function bar(label, value, total, className) {
  const width = total ? Math.max(0, Math.min(100, (value / total) * 100)) : 0;
  return `
    <div class="bar">
      <span>${esc(label)}</span>
      <div class="track"><div class="fill ${esc(className)}" style="width:${width}%"></div></div>
      <strong>${esc(value)}/${esc(total)}</strong>
    </div>
  `;
}

function pressureColor(level) {
  if (level === "High") return "orange";
  if (level === "Moderate") return "yellow";
  return "green";
}

function legend(level, label, description) {
  return `<div class="legend-item"><span class="flag ${esc(level)}">${esc(label)}</span><p>${esc(description)}</p></div>`;
}

function textureEvidenceList(title, axis) {
  const current = item();
  const items = current.evidence
    .map((card, index) => ({ card, index }))
    .filter((entry) => textureAxis(entry.card) === axis);
  return `
    <div class="texture-evidence-list">
      <h4>${esc(title)}</h4>
      ${items.length
        ? items.map(({ card, index }) => `
          <button class="texture-evidence-item" data-evidence-target="${esc(evidenceId(index))}">
            <span class="flag ${esc(card[1])}">${esc(card[2])}</span>
            <strong>${esc(card[0])}</strong>
            <span class="axis-source">${card[7] ? "Explicit texture-axis card" : "Inferred from evidence label/text"}</span>
            <small>${esc(card[3]).slice(0, 150)}${card[3].length > 150 ? "..." : ""}</small>
            ${card[4]?.[0]?.[0] ? `<small>Marked: ${esc(card[4][0][0]).slice(0, 120)}${card[4][0][0].length > 120 ? "..." : ""}</small>` : ""}
          </button>
        `).join("")
        : `<p class="panel-note">No explicit ${esc(title.toLowerCase())} cards in this synthetic case.</p>`}
    </div>
  `;
}

function textureAxis(card) {
  if (card[7] === "human" || card[7] === "machine") return card[7];
  if (card[7] === "none") return "none";
  const text = `${card[0]} ${card[3]}`.toLowerCase();
  const human = /human texture|source-backed|domain authorship|specificity|non-native|rough|idiosyncratic/.test(text);
  const machine = /editorial polish|machine|polished|generalization|template|smooth/.test(text);
  if (human && !machine) return "human";
  if (machine && !human) return "machine";
  return "none";
}

function textureAxisBadge(card) {
  const axis = textureAxis(card);
  if (axis === "human") return `<span class="texture-badge yellow">Human / source texture - ${card[7] ? "explicit" : "inferred"}</span>`;
  if (axis === "machine") return `<span class="texture-badge blue">Machine / editorial cleanliness - ${card[7] ? "explicit" : "inferred"}</span>`;
  return "";
}

function evidenceId(index) {
  return `evidence-${index + 1}`;
}

function timeline() {
  const current = item();
  $("#timeline").innerHTML = `<div class="stack">${current.messages.map((message) => `
    <article class="card message ${message[2] === "context" ? "context" : ""}">
      <div class="meta">
        <strong>${esc(message[0])}</strong><br>
        <span>${esc(message[1])}</span><br>
        <span>${esc(message[3])}</span><br>
        <span>${esc(message[4])}</span>
      </div>
      <div class="body">
        <p>${esc(message[5])}</p>
        <div class="flag-row">${message[6].map((flag) => `<span class="flag ${message[2] === "context" ? "gray" : "green"}">${esc(flag)}</span>`).join("")}</div>
      </div>
    </article>
  `).join("")}</div>`;
}

function claims() {
  const current = item();
  $("#claims").innerHTML = `
    <section class="panel">
      <h3>Claim Map</h3>
      <table class="source-table">
        <thead><tr><th>Claim / Observation</th><th>Type</th><th>Status</th><th>Review Posture</th></tr></thead>
        <tbody>
          ${current.claims.map((claim) => `
            <tr>
              <td>${esc(claim[0])}</td>
              <td>${esc(claim[1])}</td>
              <td class="claim-status">${esc(claim[2])}</td>
              <td><span class="flag ${claimColor(claim[3])}">${esc(claim[3])}</span></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </section>
  `;
}

function claimColor(label) {
  return /Verify|Review|Overextended|checking/i.test(label) ? "yellow" : "green";
}

function evidence() {
  const current = item();
  $("#evidence").innerHTML = `<div class="stack">${current.evidence.map((card) => `
    <article class="card body" id="${esc(evidenceId(current.evidence.indexOf(card)))}" data-evidence-card="${esc(evidenceId(current.evidence.indexOf(card)))}">
      <div class="header">
        <div><span class="tag">${esc(card[2])}</span><h3>${esc(card[0])}</h3></div>
        <div class="flag-row">
          ${textureAxisBadge(card)}
          <span class="flag ${esc(card[1])}">${esc(card[1])}</span>
        </div>
      </div>
      <blockquote>${esc(card[3])}</blockquote>
      <section class="marked">
        <p class="kicker">Marked Text</p>
        ${card[4].map((mark) => `
          <div class="mark">
            <code>${esc(mark[0])}</code>
            <span>${esc(mark[1])}</span>
            <p>${esc(mark[2])}</p>
          </div>
        `).join("")}
      </section>
      <div class="grid">
        <section class="box"><h3>Reasoning Chain</h3><ol>${card[5].map((line) => `<li>${esc(line)}</li>`).join("")}</ol></section>
        <section class="box"><h3>Alternative Explanations</h3><ul>${card[6].map((line) => `<li>${esc(line)}</li>`).join("")}</ul></section>
      </div>
    </article>
  `).join("")}</div>`;
}

function sources() {
  const current = item();
  $("#sources").innerHTML = `
    <section class="panel">
      <h3>Synthetic Source Inventory</h3>
      <table class="source-table">
        <thead><tr><th>ID</th><th>Role</th><th>Date</th><th>Demo Source ID</th><th>Summary</th></tr></thead>
        <tbody>${current.messages.map((message) => `
          <tr>
            <td>${esc(message[0])}</td>
            <td>${esc(message[1])}</td>
            <td>${esc(message[3])}</td>
            <td>${esc(message[4])}</td>
            <td>${esc(message[5])}</td>
          </tr>
        `).join("")}</tbody>
      </table>
    </section>
  `;
}

document.addEventListener("click", (event) => {
  const caseButton = event.target.closest("[data-case]");
  if (caseButton) {
    selected = caseButton.dataset.case;
    view = "summary";
    render();
    return;
  }
  const viewButton = event.target.closest("[data-view]");
  if (viewButton) {
    view = viewButton.dataset.view;
    renderView();
  }
  const evidenceButton = event.target.closest("[data-evidence-target]");
  if (evidenceButton) {
    view = "evidence";
    renderView();
    requestAnimationFrame(() => {
      const card = document.querySelector(`[data-evidence-card="${CSS.escape(evidenceButton.dataset.evidenceTarget)}"]`);
      if (!card) return;
      card.scrollIntoView({ behavior: "smooth", block: "start" });
      card.classList.add("evidence-card-focus");
      window.setTimeout(() => card.classList.remove("evidence-card-focus"), 1800);
    });
  }
});

render();
</script>
</body>
</html>
