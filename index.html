<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracewright Letter Uncertainty Map</title>
<style>
:root{--paper:#f7f3eb;--panel:#fffdf8;--ink:#202124;--muted:#6b6258;--line:#d9d0c3;--accent:#315f72;--blue:#d7e3f5;--green:#dcebd9;--yellow:#f5e8bd;--orange:#f3cfaa;--gray:#e7e3dd}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Segoe UI,system-ui,sans-serif}.shell{display:grid;grid-template-columns:320px 1fr;min-height:100vh}aside{padding:28px 22px;background:#ece5d9;border-right:1px solid var(--line)}main{padding:32px;max-width:1160px}h1,h2,h3,p{margin-top:0}h1{font-size:28px;line-height:1.1}.kicker{margin:0 0 8px;color:var(--accent);font-size:12px;font-weight:800;text-transform:uppercase}.notice,.overview{border-left:4px solid var(--accent);background:#dcecf0;padding:14px 16px;margin:18px 0;line-height:1.55}.case-list,.stack{display:grid;gap:12px}.case-button{width:100%;border:1px solid var(--line);border-radius:8px;background:rgba(255,253,248,.75);padding:14px;text-align:left;cursor:pointer}.case-button.active{border-color:var(--accent);background:var(--panel)}.case-button span{display:block;margin-top:4px;color:var(--muted);font-size:13px}.header{display:flex;justify-content:space-between;gap:16px;margin-bottom:14px}.status{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.tag,.flag{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;min-height:28px;padding:5px 10px;background:var(--panel);color:var(--muted);font-size:12px;font-weight:700}.green{background:var(--green)}.yellow{background:var(--yellow)}.orange{background:var(--orange)}.blue{background:var(--blue)}.gray{background:var(--gray)}.tabs{display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:16px}.tab{border:1px solid transparent;border-bottom:0;border-radius:8px 8px 0 0;background:transparent;padding:10px 14px;color:var(--muted);cursor:pointer}.tab.active{border-color:var(--line);background:var(--panel);color:var(--ink)}.view{display:none}.view.active{display:block}.panel,.card{border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:0 8px 18px rgba(35,31,26,.05)}.panel{padding:18px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.tri{grid-template-columns:repeat(3,minmax(0,1fr))}.message{display:grid;grid-template-columns:190px 1fr}.message.context{background:#f2f0ec;border-style:dashed;opacity:.82}.meta{padding:18px;border-right:1px solid var(--line);background:rgba(236,229,217,.5)}.body{padding:18px}.flag-row{display:flex;gap:8px;flex-wrap:wrap}blockquote{margin:0 0 14px;border-left:4px solid var(--accent);background:#f4efe5;padding:14px 16px;line-height:1.6}.marked{margin:14px 0;border:1px solid var(--line);border-radius:8px;background:#fffaf0;padding:14px}.mark{display:grid;grid-template-columns:180px 170px 1fr;gap:10px;margin-top:10px}code{background:var(--orange);border-radius:6px;padding:4px 7px}.box{border:1px solid var(--line);border-radius:8px;background:#fbf8f1;padding:14px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:12px;text-align:left;vertical-align:top}.table th{color:var(--muted);font-size:12px;text-transform:uppercase}.guide{margin:8px 0 0;padding-left:20px;line-height:1.6}.bar{display:grid;grid-template-columns:160px 1fr 48px;gap:10px;align-items:center;margin:8px 0}.track{height:10px;border-radius:999px;background:#ece5d9;overflow:hidden}.fill{height:100%;border-radius:999px;background:#567ca0}.fill.review{background:#af6e4d}.fill.anchor{background:#62835f}.fill.claims{background:#b79b49}@media(max-width:900px){.shell,.message,.grid,.tri,.mark{grid-template-columns:1fr}main{padding:22px}aside{border-right:0;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<div class="shell"><aside><p class="kicker">Tracewright Demo</p><h1>Letter Uncertainty Map</h1><div class="notice"><strong>This is not an AI detector.</strong><br>Tracewright is not designed to expose people. It is designed to slow down premature judgment. All cases below are synthetic review materials.</div><div id="caseList" class="case-list"></div></aside><main><header class="header"><div><p class="kicker" id="stage">Demo case</p><h2 id="name">Case</h2></div><div class="status"><span id="count" class="tag">0 materials</span><span id="level" class="tag">Review posture</span></div></header><nav class="tabs"><button class="tab active" data-view="summary">Summary</button><button class="tab" data-view="timeline">Timeline</button><button class="tab" data-view="claims">Claims</button><button class="tab" data-view="evidence">Evidence</button><button class="tab" data-view="sources">Synthetic Source Inventory</button></nav><section id="summary" class="view active"></section><section id="timeline" class="view"></section><section id="claims" class="view"></section><section id="evidence" class="view"></section><section id="sources" class="view"></section></main></div>
<script>
const cases=[
{id:'baseline',name:'Case A: Self-Written Baseline',stage:'Personal correspondence',level:'Baseline-like pattern',intuition:'The correspondent appears to write directly, with light or no tool support.',overview:'Strong response alignment, stable claims, concrete callbacks, and small local imperfections support a self-written or lightly checked reading.',posture:'Use as a reading baseline, not as proof. The point is to map evidence, not to certify authorship.',attention:[2,1,4,2],screening:['Baseline reference','Medium: three messages only','Synthetic demo data; no real private letter included.','Shows what stable human texture can look like.','Medium if treated as a universal standard.'],checks:['Collect more letters.','Check whether small irregularities persist.','Avoid using this as a rigid normal.'],claims:[['Works in a local technical business.','Verifiable background claim','First appeared','Stable'],['Learned Japanese for personal reasons.','Self-history claim','Repeated with detail','Stable'],['May use grammar checking.','Tool-use possibility','Unknown','Ask only if relevant']],messages:[['A001','Reviewer / context','context','2026-04-01','synthetic:A001','The reviewer asks about local work, music, and language learning.',['Context only']],['C001','Correspondent / target','target','2026-04-03','synthetic:C001','The correspondent answers directly, gives concrete work details, and asks a specific return question.',['Stable','Direct response','Human texture']],['C002','Correspondent / target','target','2026-04-10','synthetic:C002','The second reply reuses earlier details naturally and keeps the same uneven but fluent style.',['Continuity','Stable style']]],evidence:[['Human Texture','green','synthetic:C001','I tried to explain it better, but maybe I make the sentence too long...',[['make the sentence too long','non-native phrasing','A small local irregularity remains in an otherwise clear sentence.']],['The phrase is clear but not polished flat.','The writer process is visible.','This supports human texture but does not prove authorship.'],['A tool could preserve original phrasing.','A non-native writer may also use grammar checking.']]]},
{id:'mixed',name:'Case B: Mixed Authorship / AI-Polish',stage:'Correspondence plus domain content',level:'Segment-level review recommended',intuition:'Short domain-specific parts feel personal; longer reflective passages feel polished.',overview:'Operational domain details remain grounded, while longer reflective passages show editorial or AI-polish signals.',posture:'Avoid one label for the whole person. Separate domain turns, response alignment, claims, and polished prose.',attention:[5,4,3,2],screening:['Segment-level review','Medium-high','Synthetic demo data modeled on a multi-turn exchange.','Shows why mixed-composition analysis matters.','High if the polished passage is used to judge every message.'],checks:['Compare short and long segments.','Ask drafting workflow naturally.','Preserve domain-specific evidence separately.'],claims:[['The chess correction follows the current board state.','Domain claim','Source-grounded','Stable'],['The literary interpretation is polished and general.','Style observation','Segment-specific','Review'],['Different segments may have different creation histories.','Mediation hypothesis','Plausible','Do not overclaim']],messages:[['A001','Reviewer / context','context','2026-04-05','synthetic:A001','The reviewer asks about a novel and continues a slow chess game.',['Context only']],['C001','Correspondent / target','target','2026-04-06','synthetic:C001','The reply contains a precise chess correction and a polished literary reflection.',['Domain anchor','AI/editorial polish?','Segment split']]],evidence:[['AI / Editorial Polish','blue','synthetic:C001','The refuge becomes a quiet cage, a poetic punishment for refusing growth.',[['quiet cage','aphoristic polish','Compact literary metaphor.'],['poetic punishment','balanced evaluative phrase','Smooth review-like cadence.']],['The prose is more polished than earlier operational messages.','The same message also contains domain-specific handling.','This supports a mixed-composition hypothesis.'],['Careful human drafting.','Human prose edited by AI.','AI-generated reflection plus personal insertion.']],['Domain Authorship Anchor','green','synthetic:C001','You wrote Nd2, but from this position I think you meant Nbd2.',[['Nbd2','domain-specific correction','Requires tracking the game state.']],['The correction is operational and specific.','It differs from the polished literary cadence.','Analyze it separately from the prose surface.'],['A domain tool could assist, but no evidence requires that.']]]},
{id:'newsletter',name:'Case C: Institutional Newsletter',stage:'Public document',level:'Multiple plausible explanations',intuition:'No reader intuition supplied. Blind review mode.',overview:'The document appears source-rich and institutionally edited. Final English may include translation, editorial smoothing, or AI assistance.',posture:'Separate source provenance, fact-checking, cross-language surface, and final prose polish.',attention:[4,3,4,5],screening:['Workflow review','Medium','Synthetic demo data modeled as a public newsletter.','Shows how this method can extend beyond personal letters.','High if polished institutional English is treated as AI authorship.'],checks:['Compare source notes and final article.','Ask whether translation or AI tools were used.','Fact-check claims separately.'],claims:[['The cassette contains two platform versions.','Material fact','Source-backed','Verify with archive record'],['The materials are available for consultation.','Access claim','Public-facing','Verify'],['Final English may hide source-language workflow.','Method caution','Low-confidence','Use provenance evidence']],messages:[['D001','Document / target','target','2026-04-20','synthetic:D001','A public newsletter combines archive object metadata, historical framing, and a polished support appeal.',['Institutional template','Archive specificity','Editorial polish']]],evidence:[['Source-Backed Specificity','green','synthetic:D001','The original cassette contains two platform versions on opposite sides, catalogued under the same acquisition record.',[['opposite sides','material detail','Physical-object detail suggests source notes or archive knowledge.'],['acquisition record','provenance cue','Links final prose to archival practice.']],['The detail is too specific for generic promotional prose.','It may come from human notes later edited or translated.','Source layer and sentence layer should be separated.'],['A well-prompted AI could rewrite supplied source notes.']],['Low-Confidence Surface Signal','yellow','synthetic:D001','These materials served for the preparation of this article and are available for consultation.',[['served for the preparation','collocation heaviness','Possible translation or institutional English; low confidence.']],['Final English is clean enough that source language is not detectable with confidence.','Small collocation clues are weak alone.','Workflow evidence matters more than surface guessing.'],['Human non-native English.','Human translation.','LLM translation plus human check.','Institutional style.']]]}
];
let selected=cases[0].id,view='summary';const $=s=>document.querySelector(s),esc=s=>String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');function item(){return cases.find(c=>c.id===selected)}function render(){renderList();renderHead();renderView()}function renderList(){$('#caseList').innerHTML=cases.map(c=>`<button class="case-button ${c.id===selected?'active':''}" data-case="${c.id}"><strong>${esc(c.name)}</strong><span>${esc(c.level)}</span></button>`).join('')}function renderHead(){const c=item();$('#stage').textContent=c.stage;$('#name').textContent=c.name;$('#count').textContent=c.messages.length+' review materials';$('#level').textContent=c.level}function renderView(){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));$('#'+view).classList.add('active');({summary,timeline,claims,evidence,sources}[view])()}function summary(){const c=item(),labels=['Review pressure','Mediated-text signals','Anchoring signals','Claim-reliability checks'];$('#summary').innerHTML=`<div class="stack"><section class="overview"><p><strong>Reader intuition:</strong> ${esc(c.intuition)}</p><p><strong>Analysis overview:</strong> ${esc(c.overview)}</p><p><strong>Uncertainty posture:</strong> ${esc(c.posture)}</p></section><section class="grid tri"><div class="panel"><p class="kicker">Review Guide</p><p>This dashboard reviews narrative materials by separating source context, claims, style texture, disclosures, and alternative explanations.</p><ul class="guide"><li>Do not decide from one label.</li><li>Read evidence cards before judging.</li><li>Keep authorship, provenance, and factual reliability separate.</li></ul></div><div class="panel"><p class="kicker">Texture Axes</p><p><span class="flag green">Human texture</span> <span class="flag blue">Mediated surface</span> <span class="flag yellow">Low-confidence signal</span></p><p>These are attention cues. They are not authenticity scores.</p></div><div class="panel"><p class="kicker">Review Lanes</p><p>Authorship / Mediation, Disclosure / Provenance, and Claim Reliability are shown separately so AI questions do not swallow every other reading question.</p></div></section><section class="panel"><p class="kicker">Attention Mix</p>${c.attention.map((n,i)=>bar(labels[i],n,i)).join('')}</section><section class="grid">${['Recommended action','Evidence completeness','Known provenance','Blind-reading value','Overclaim risk'].map((l,i)=>`<div class="panel"><p class="kicker">${l}</p><p>${esc(c.screening[i])}</p></div>`).join('')}<div class="panel"><h3>Next Checks</h3><ul class="guide">${c.checks.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div></section></div>`}function bar(label,n,i){const cls=['review','','anchor','claims'][i]||'';return `<div class="bar"><span>${esc(label)}</span><div class="track"><div class="fill ${cls}" style="width:${n*20}%"></div></div><strong>${n}/5</strong></div>`}function timeline(){const c=item();$('#timeline').innerHTML='<div class="stack">'+c.messages.map(m=>`<article class="card message ${m[2]==='context'?'context':''}"><div class="meta"><strong>${esc(m[0])}</strong><br><span>${esc(m[1])}</span><br><span>${esc(m[3])}</span><br><span>${esc(m[4])}</span></div><div class="body"><p>${esc(m[5])}</p><div class="flag-row">${m[6].map(f=>`<span class="flag ${m[2]==='context'?'gray':'green'}">${esc(f)}</span>`).join('')}</div></div></article>`).join('')+'</div>'}function claims(){const c=item();$('#claims').innerHTML=`<section class="panel"><h3>Claim Map</h3><table class="table"><thead><tr><th>Claim / Observation</th><th>Type</th><th>Status</th><th>Review Posture</th></tr></thead><tbody>${c.claims.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td><td>${esc(r[2])}</td><td><span class="flag ${r[3].includes('Verify')||r[3].includes('Review')?'yellow':'green'}">${esc(r[3])}</span></td></tr>`).join('')}</tbody></table></section>`}function evidence(){const c=item();$('#evidence').innerHTML='<div class="stack">'+c.evidence.map(e=>`<article class="card body"><div class="header"><div><span class="tag">${esc(e[2])}</span><h3>${esc(e[0])}</h3></div><span class="flag ${e[1]}">${esc(e[1])}</span></div><blockquote>${esc(e[3])}</blockquote><section class="marked"><p class="kicker">Marked Text</p>${e[4].map(m=>`<div class="mark"><code>${esc(m[0])}</code><span>${esc(m[1])}</span><p>${esc(m[2])}</p></div>`).join('')}</section><div class="grid"><section class="box"><h3>Reasoning Chain</h3><ol>${e[5].map(x=>`<li>${esc(x)}</li>`).join('')}</ol></section><section class="box"><h3>Alternative Explanations</h3><ul>${e[6].map(x=>`<li>${esc(x)}</li>`).join('')}</ul></section></div></article>`).join('')+'</div>'}function sources(){const c=item();$('#sources').innerHTML=`<section class="panel"><h3>Synthetic Source Inventory</h3><table class="table"><thead><tr><th>ID</th><th>Role</th><th>Date</th><th>Demo Source ID</th><th>Summary</th></tr></thead><tbody>${c.messages.map(m=>`<tr><td>${esc(m[0])}</td><td>${esc(m[1])}</td><td>${esc(m[3])}</td><td>${esc(m[4])}</td><td>${esc(m[5])}</td></tr>`).join('')}</tbody></table></section>`}document.addEventListener('click',e=>{const c=e.target.closest('[data-case]');if(c){selected=c.dataset.case;render();return}const t=e.target.closest('[data-view]');if(t){view=t.dataset.view;renderView()}});render();
</script>
</body>
</html>
